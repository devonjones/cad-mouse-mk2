; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[platformio]
src_dir = firmware/src
include_dir = firmware/include
lib_dir = firmware/lib
data_dir = firmware/data
test_dir = firmware/test
default_envs = unit1

[env]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-rp2040
framework = arduino

board_build.core = earlephilhower
; Present as a 3Dconnexion SpaceMouse Compact so 3DxWare/spacenavd bind to it.
; If your real 3Dconnexion device is also a Compact and the driver gets
; confused, switch usb_pid to 0xC62E (SpaceMouse Wireless, cabled).
board_build.arduino.earlephilhower.usb_vid = 0x256F
board_build.arduino.earlephilhower.usb_pid = 0xC635
board_build.arduino.earlephilhower.usb_manufacturer = 3Dconnexion
board_build.arduino.earlephilhower.usb_product = SpaceMouse Compact

lib_deps =
	infineon/XENSIV 3D Magnetic Sensor TLx493D@^1.1.0
	bxparks/AceButton@^1.10.1
	adafruit/Adafruit NeoPixel@^1.12.3

build_src_filter = +<*> -<diag_main.cpp>

; One env per physical unit — calibration lives in firmware/include/units/.
[env:unit1]
build_flags =
	-DUSE_TINYUSB
	-DUNIT=1

[env:unit2]
build_flags =
	-DUSE_TINYUSB
	-DUNIT=2

; Hardware diagnostic (serial-only, probes sensors + load switches).
[env:diag]
build_flags =
	-DUSE_TINYUSB
	-DUNIT=2
build_src_filter = +<diag_main.cpp>